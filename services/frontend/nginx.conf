server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: all routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the AAKP API service
    location /api/ {
        proxy_pass http://aakp-api.aakp-information.svc.cluster.local:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health probes (S26) — proxy to API /health/*
    location /health/ {
        proxy_pass http://aakp-api.aakp-information.svc.cluster.local:8000/health/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket proxy for interview sessions
    location /ws/ {
        proxy_pass http://aakp-api.aakp-information.svc.cluster.local:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # OpenMetadata catalog (S25) — cluster service proxy
    location /openmetadata/ {
        proxy_pass http://aakp-openmetadata.aakp-information.svc.cluster.local:8585/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
