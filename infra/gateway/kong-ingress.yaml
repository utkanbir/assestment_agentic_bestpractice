# Kong Ingress Rules — S1-DA-004
# Routes all AAKP traffic through Kong Gateway proxy (NodePort 30080)
#
# OpenMetadata UI: proxied at /openmetadata/ → aakp-openmetadata:8585
# Frontend catalog page: /catalog (SPA route)
#
# Apply after services are running:
#   kubectl apply -f infra/gateway/kong-ingress.yaml
#
# Test: curl http://localhost:30080/api/v1/health

---
# Strip /api prefix plugin (optional — API already has /api/v1 prefix, so no strip needed)
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: cors-allow-all
  namespace: aakp-information
  labels:
    app.kubernetes.io/part-of: aakp
plugin: cors
config:
  origins:
    - "*"
  methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  headers:
    - Accept
    - Authorization
    - Content-Type
  credentials: true
  max_age: 3600
---
# REST API + WebSocket routing → aakp-api
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aakp-api-ingress
  namespace: aakp-information
  labels:
    app.kubernetes.io/part-of: aakp
  annotations:
    konghq.com/plugins: cors-allow-all
    # WebSocket upgrade support
    nginx.org/websocket-services: "aakp-api"
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: aakp-api
                port:
                  number: 8000
          - path: /health/
            pathType: Prefix
            backend:
              service:
                name: aakp-api
                port:
                  number: 8000
          - path: /ws/
            pathType: Prefix
            backend:
              service:
                name: aakp-api
                port:
                  number: 8000
---
# OpenMetadata catalog UI → aakp-openmetadata (S25-DA-001)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aakp-openmetadata-ingress
  namespace: aakp-information
  labels:
    app.kubernetes.io/part-of: aakp
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /openmetadata/
            pathType: Prefix
            backend:
              service:
                name: aakp-openmetadata
                port:
                  number: 8585
---
# Frontend → aakp-frontend (catch-all, must come after /api and /ws)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aakp-frontend-ingress
  namespace: aakp-information
  labels:
    app.kubernetes.io/part-of: aakp
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aakp-frontend
                port:
                  number: 80
---
# MCP Server routing → aakp-mcp-server
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aakp-mcp-ingress
  namespace: aakp-information
  labels:
    app.kubernetes.io/part-of: aakp
  annotations:
    konghq.com/plugins: cors-allow-all
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /mcp/
            pathType: Prefix
            backend:
              service:
                name: aakp-mcp-server
                port:
                  number: 8080
