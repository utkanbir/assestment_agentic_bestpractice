# Kafka - KRaft mode, confluentinc/cp-kafka:7.6.0 (env var based config, no Zookeeper)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aakp-kafka-data
  namespace: aakp-data
  labels:
    app.kubernetes.io/part-of: aakp
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aakp-kafka
  namespace: aakp-data
  labels:
    app: aakp-kafka
    app.kubernetes.io/part-of: aakp
spec:
  serviceName: aakp-kafka
  replicas: 1
  selector:
    matchLabels:
      app: aakp-kafka
  template:
    metadata:
      labels:
        app: aakp-kafka
        app.kubernetes.io/part-of: aakp
    spec:
      serviceAccountName: aakp-sa
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.0
          ports:
            - containerPort: 9092
              name: client
            - containerPort: 9093
              name: controller
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://aakp-kafka.aakp-data.svc.cluster.local:9092"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:9093"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"
            - name: KAFKA_HEAP_OPTS
              value: "-Xmx512m -Xms256m"
            - name: CLUSTER_ID
              value: "MkU3OEVBNTcwNTJENDM2Qk"
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 500m
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: aakp-kafka-data
---
apiVersion: v1
kind: Service
metadata:
  name: aakp-kafka
  namespace: aakp-data
  labels:
    app: aakp-kafka
    app.kubernetes.io/part-of: aakp
spec:
  type: ClusterIP
  ports:
    - port: 9092
      targetPort: 9092
      name: client
  selector:
    app: aakp-kafka
---
# Job: 4 AAKP topic'ini Kafka hazır olduktan sonra oluştur
apiVersion: batch/v1
kind: Job
metadata:
  name: aakp-kafka-topics
  namespace: aakp-data
  labels:
    app.kubernetes.io/part-of: aakp
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-topics
          image: confluentinc/cp-kafka:7.6.0
          command:
            - sh
            - -c
            - |
              until kafka-topics --bootstrap-server aakp-kafka:9092 --list 2>/dev/null; do
                echo "Waiting for Kafka..."; sleep 5
              done
              for TOPIC in interview.answer.submitted assessment.finding.created assessment.interview.completed assessment.task.status.changed; do
                kafka-topics --bootstrap-server aakp-kafka:9092 \
                  --create --if-not-exists \
                  --topic $TOPIC \
                  --partitions 3 \
                  --replication-factor 1
                echo "Created: $TOPIC"
              done
  backoffLimit: 10
