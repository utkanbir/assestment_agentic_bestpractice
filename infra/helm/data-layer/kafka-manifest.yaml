# Kafka - apache/kafka:3.7.0 official image, KRaft mode (no Zookeeper)
apiVersion: v1
kind: ConfigMap
metadata:
  name: aakp-kafka-config
  namespace: aakp-data
  labels:
    app.kubernetes.io/part-of: aakp
data:
  server.properties: |
    process.roles=broker,controller
    node.id=1
    controller.quorum.voters=1@localhost:9093
    listeners=PLAINTEXT://:9092,CONTROLLER://:9093
    advertised.listeners=PLAINTEXT://aakp-kafka.aakp-data.svc.cluster.local:9092
    controller.listener.names=CONTROLLER
    inter.broker.listener.name=PLAINTEXT
    log.dirs=/var/lib/kafka/data
    num.partitions=3
    default.replication.factor=1
    offsets.topic.replication.factor=1
    transaction.state.log.replication.factor=1
    transaction.state.log.min.isr=1
    log.retention.hours=168
    auto.create.topics.enable=true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aakp-kafka-data
  namespace: aakp-data
  labels:
    app.kubernetes.io/part-of: aakp
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aakp-kafka
  namespace: aakp-data
  labels:
    app: aakp-kafka
    app.kubernetes.io/part-of: aakp
spec:
  serviceName: aakp-kafka
  replicas: 1
  selector:
    matchLabels:
      app: aakp-kafka
  template:
    metadata:
      labels:
        app: aakp-kafka
        app.kubernetes.io/part-of: aakp
    spec:
      serviceAccountName: aakp-sa
      initContainers:
        - name: kafka-init
          image: apache/kafka:3.7.0
          command:
            - sh
            - -c
            - |
              CLUSTER_ID=$(/opt/kafka/bin/kafka-storage.sh random-uuid)
              /opt/kafka/bin/kafka-storage.sh format \
                --config /opt/kafka/config/kraft/server.properties \
                --cluster-id $CLUSTER_ID \
                --ignore-formatted
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
      containers:
        - name: kafka
          image: apache/kafka:3.7.0
          ports:
            - containerPort: 9092
              name: client
            - containerPort: 9093
              name: controller
          env:
            - name: KAFKA_HEAP_OPTS
              value: "-Xmx768m -Xms256m"
          command:
            - /opt/kafka/bin/kafka-server-start.sh
            - /opt/kafka/config/kraft/server.properties
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 500m
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: aakp-kafka-data
---
apiVersion: v1
kind: Service
metadata:
  name: aakp-kafka
  namespace: aakp-data
  labels:
    app: aakp-kafka
    app.kubernetes.io/part-of: aakp
spec:
  type: ClusterIP
  ports:
    - port: 9092
      targetPort: 9092
      name: client
  selector:
    app: aakp-kafka
---
# Job: create AAKP topics after Kafka is ready
apiVersion: batch/v1
kind: Job
metadata:
  name: aakp-kafka-topics
  namespace: aakp-data
  labels:
    app.kubernetes.io/part-of: aakp
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-topics
          image: apache/kafka:3.7.0
          command:
            - sh
            - -c
            - |
              until /opt/kafka/bin/kafka-topics.sh --bootstrap-server aakp-kafka:9092 --list; do
                echo "Waiting for Kafka..."; sleep 5
              done
              for TOPIC in interview.answer.submitted assessment.finding.created assessment.interview.completed assessment.task.status.changed; do
                /opt/kafka/bin/kafka-topics.sh \
                  --bootstrap-server aakp-kafka:9092 \
                  --create --if-not-exists \
                  --topic $TOPIC \
                  --partitions 3 \
                  --replication-factor 1
                echo "Topic created: $TOPIC"
              done
  backoffLimit: 5
