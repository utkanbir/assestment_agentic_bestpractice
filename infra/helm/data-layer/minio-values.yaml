# MinIO - standalone mode, aakp-data namespace
# Official MinIO Helm chart (charts.min.io) - not Bitnami
mode: standalone

rootUser: aakp-admin
rootPassword: aakp-minio-secret

# Auto-create buckets on startup
buckets:
  - name: bronze
    policy: none
    purge: false
  - name: archive
    policy: none
    purge: false

persistence:
  enabled: true
  size: 10Gi

resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 1Gi
    cpu: 500m

service:
  type: ClusterIP
  port: 9000

consoleService:
  type: ClusterIP
  port: 9001
