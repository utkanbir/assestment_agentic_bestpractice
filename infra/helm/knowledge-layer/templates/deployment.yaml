apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aakp-fuseki.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aakp-fuseki.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "aakp-fuseki.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aakp-fuseki.selectorLabels" . | nindent 8 }}
        {{- include "aakp-fuseki.labels" . | nindent 8 }}
    spec:
      serviceAccountName: aakp-sa
      securityContext:
        fsGroup: 9008
      # Init container: copies TDB2 config from ConfigMap into the Fuseki data volume
      initContainers:
        - name: config-init
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /fuseki/configuration
              cp /config/aakp.ttl /fuseki/configuration/aakp.ttl
              echo "Fuseki config copied."
          volumeMounts:
            - name: fuseki-data
              mountPath: /fuseki
            - name: fuseki-config
              mountPath: /config
      containers:
        - name: fuseki
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aakp-fuseki-secret
                  key: admin-password
            - name: JVM_ARGS
              value: "-Xmx768m"
          ports:
            - name: http
              containerPort: 3030
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /$/ping
              port: 3030
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /$/ping
              port: 3030
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: fuseki-data
              mountPath: /fuseki
      volumes:
        - name: fuseki-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: aakp-fuseki-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: fuseki-config
          configMap:
            name: aakp-fuseki-config
