apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aakp-fuseki.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aakp-fuseki.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "aakp-fuseki.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aakp-fuseki.selectorLabels" . | nindent 8 }}
        {{- include "aakp-fuseki.labels" . | nindent 8 }}
    spec:
      serviceAccountName: aakp-sa
      containers:
        - name: fuseki
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsUser: 0
          env:
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aakp-fuseki-secret
                  key: admin-password
            - name: JVM_ARGS
              value: "-Xmx768m"
          ports:
            - name: http
              containerPort: 3030
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /$/ping
              port: 3030
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /$/ping
              port: 3030
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            # Mount PVC only at databases dir — image's own /fuseki structure is preserved
            - name: fuseki-databases
              mountPath: /fuseki/databases
            # Inject TDB2 config directly into configuration dir via subPath
            - name: fuseki-config
              mountPath: /fuseki/configuration/aakp.ttl
              subPath: aakp.ttl
      volumes:
        - name: fuseki-databases
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: aakp-fuseki-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: fuseki-config
          configMap:
            name: aakp-fuseki-config
