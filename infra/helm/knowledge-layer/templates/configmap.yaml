apiVersion: v1
kind: ConfigMap
metadata:
  name: aakp-fuseki-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aakp-fuseki.labels" . | nindent 4 }}
data:
  # Fuseki TDB2 dataset configuration — persistent storage at /fuseki/databases/aakp
  aakp.ttl: |
    PREFIX fuseki: <http://jena.apache.org/fuseki#>
    PREFIX rdf:    <http://www.w3.org/1999/02/22-rdf-syntax-ns#>
    PREFIX tdb2:   <http://jena.apache.org/2016/tdb#>
    PREFIX ja:     <http://jena.hpl.hp.com/2005/11/Assembler#>

    <#service> rdf:type fuseki:Service ;
        fuseki:name {{ .Values.fuseki.datasetName | quote }} ;
        fuseki:endpoint [ fuseki:operation fuseki:query  ; fuseki:name "sparql" ] ;
        fuseki:endpoint [ fuseki:operation fuseki:query  ; fuseki:name "query"  ] ;
        fuseki:endpoint [ fuseki:operation fuseki:update ; fuseki:name "update" ] ;
        fuseki:endpoint [ fuseki:operation fuseki:gsp-r  ; fuseki:name "get"    ] ;
        fuseki:endpoint [ fuseki:operation fuseki:gsp-rw ; fuseki:name "data"   ] ;
        fuseki:endpoint [ fuseki:operation fuseki:upload ; fuseki:name "upload" ] ;
        fuseki:dataset <#dataset> ;
        .

    <#dataset> rdf:type tdb2:DatasetTDB2 ;
        tdb2:location "/fuseki/databases/{{ .Values.fuseki.datasetName }}" ;
        .
