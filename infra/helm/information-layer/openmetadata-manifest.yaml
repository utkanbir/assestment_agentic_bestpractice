# OpenMetadata — S3-BA-001
# Deployed in aakp-information namespace alongside API, Qdrant
# Dependencies: PostgreSQL (shared aakp DB), Elasticsearch (bundled or external)
#
# This manifest deploys OpenMetadata server only.
# MySQL/Elasticsearch bundled dependencies are managed by the Helm chart.
# For Docker Desktop dev: simplified single-pod deployment.

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aakp-openmetadata-config
  namespace: aakp-information
  labels:
    app.kubernetes.io/part-of: aakp
data:
  # OpenMetadata server config
  OM_SERVER_HOST: "0.0.0.0"
  OM_SERVER_PORT: "8585"
  # Database (shared PostgreSQL)
  DB_HOST: "aakp-postgresql.aakp-information.svc.cluster.local"
  DB_PORT: "5432"
  DB_USER: "aakp"
  DB_SCHEME: "postgresql"
  OM_DATABASE: "openmetadata_db"
  # Elasticsearch (bundled)
  ELASTICSEARCH_HOST: "localhost"
  ELASTICSEARCH_PORT: "9200"
  # Auth: disable for dev
  AUTHENTICATION_PROVIDER: "basic"
  AUTHORIZER_CLASS_NAME: "org.openmetadata.service.security.NoopAuthorizer"

---
apiVersion: v1
kind: Secret
metadata:
  name: aakp-openmetadata-secret
  namespace: aakp-information
  labels:
    app.kubernetes.io/part-of: aakp
type: Opaque
stringData:
  DB_PASSWORD: "aakp-pg-secret"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aakp-openmetadata
  namespace: aakp-information
  labels:
    app: aakp-openmetadata
    app.kubernetes.io/part-of: aakp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aakp-openmetadata
  template:
    metadata:
      labels:
        app: aakp-openmetadata
        app.kubernetes.io/part-of: aakp
    spec:
      serviceAccountName: aakp-sa
      initContainers:
        # Wait for PostgreSQL to be ready
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z aakp-postgresql.aakp-information.svc.cluster.local 5432; do echo waiting for postgres; sleep 3; done"]
      containers:
        - name: openmetadata
          image: docker.getcollate.io/openmetadata/server:1.3.1
          ports:
            - containerPort: 8585
              name: http
            - containerPort: 8586
              name: admin
          envFrom:
            - configMapRef:
                name: aakp-openmetadata-config
            - secretRef:
                name: aakp-openmetadata-secret
          readinessProbe:
            httpGet:
              path: /api/v1/health-check
              port: 8585
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health-check
              port: 8585
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              memory: 1Gi
              cpu: 500m
            limits:
              memory: 2Gi
              cpu: 1000m

---
apiVersion: v1
kind: Service
metadata:
  name: aakp-openmetadata
  namespace: aakp-information
  labels:
    app: aakp-openmetadata
    app.kubernetes.io/part-of: aakp
spec:
  type: ClusterIP
  ports:
    - port: 8585
      targetPort: 8585
      name: http
    - port: 8586
      targetPort: 8586
      name: admin
  selector:
    app: aakp-openmetadata

---
# Job: Create OpenMetadata database in PostgreSQL (runs once)
apiVersion: batch/v1
kind: Job
metadata:
  name: aakp-openmetadata-db-init
  namespace: aakp-information
  labels:
    app.kubernetes.io/part-of: aakp
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-db
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              PGPASSWORD=aakp-pg-secret psql \
                -h aakp-postgresql.aakp-information.svc.cluster.local \
                -U aakp \
                -c "CREATE DATABASE openmetadata_db;" 2>/dev/null || true
              echo "OpenMetadata DB ready"
  backoffLimit: 5
