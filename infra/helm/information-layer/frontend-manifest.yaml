# AAKP Frontend (React + nginx) — aakp-information namespace
# S1-FA-007: K8s deployment

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aakp-frontend
  namespace: aakp-information
  labels:
    app: aakp-frontend
    app.kubernetes.io/part-of: aakp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aakp-frontend
  template:
    metadata:
      labels:
        app: aakp-frontend
        app.kubernetes.io/part-of: aakp
    spec:
      serviceAccountName: aakp-sa
      containers:
        - name: frontend
          image: aakp/frontend:sprint14
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
---
apiVersion: v1
kind: Service
metadata:
  name: aakp-frontend
  namespace: aakp-information
  labels:
    app: aakp-frontend
    app.kubernetes.io/part-of: aakp
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: aakp-frontend
