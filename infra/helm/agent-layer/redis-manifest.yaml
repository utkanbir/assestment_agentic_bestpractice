# Redis 7 - official redis:7-alpine image
apiVersion: v1
kind: Secret
metadata:
  name: aakp-redis-secret
  namespace: aakp-agent
  labels:
    app.kubernetes.io/part-of: aakp
type: Opaque
stringData:
  REDIS_PASSWORD: aakp-redis-secret
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aakp-redis-data
  namespace: aakp-agent
  labels:
    app.kubernetes.io/part-of: aakp
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aakp-redis
  namespace: aakp-agent
  labels:
    app: aakp-redis
    app.kubernetes.io/part-of: aakp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aakp-redis
  template:
    metadata:
      labels:
        app: aakp-redis
        app.kubernetes.io/part-of: aakp
    spec:
      serviceAccountName: aakp-sa
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --appendonly
            - "yes"
            - --dir
            - /data
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aakp-redis-secret
                  key: REDIS_PASSWORD
          readinessProbe:
            exec:
              command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 250m
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: aakp-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: aakp-redis
  namespace: aakp-agent
  labels:
    app: aakp-redis
    app.kubernetes.io/part-of: aakp
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: aakp-redis
