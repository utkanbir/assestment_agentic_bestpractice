# Redis — standalone mode, aakp-agent namespace
architecture: standalone

auth:
  enabled: true
  password: aakp-redis-secret

master:
  persistence:
    enabled: true
    size: 2Gi

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 250m

service:
  type: ClusterIP
  port: 6379

metrics:
  enabled: false
