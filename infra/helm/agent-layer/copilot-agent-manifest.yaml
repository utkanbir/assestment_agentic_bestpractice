---
# S5-AA-004/005: Ontology Co-Pilot Agent
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aakp-copilot-agent
  namespace: aakp-agent
  labels:
    app: aakp-copilot-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aakp-copilot-agent
  template:
    metadata:
      labels:
        app: aakp-copilot-agent
    spec:
      containers:
        - name: copilot-agent
          image: aakp/copilot-agent:sprint5-aa004
          ports:
            - containerPort: 8000
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aakp-k8s-agent-secret
                  key: ANTHROPIC_API_KEY
            - name: API_BASE_URL
              value: "http://aakp-api.aakp-information.svc.cluster.local:8000"
            - name: FUSEKI_URL
              value: "http://aakp-fuseki.aakp-information.svc.cluster.local:3030"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: aakp-copilot-agent
  namespace: aakp-agent
spec:
  selector:
    app: aakp-copilot-agent
  ports:
    - port: 8000
      targetPort: 8000
