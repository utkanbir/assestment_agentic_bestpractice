---
# S6-DA-004: Grafana Tempo deploy + OpenTelemetry collector
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: aakp-monitoring
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
    compactor:
      compaction:
        block_retention: 720h   # 30 days
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aakp-tempo
  namespace: aakp-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aakp-tempo
  template:
    metadata:
      labels:
        app: aakp-tempo
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:2.4.0
          args: ["-config.file=/etc/tempo/tempo.yaml"]
          ports:
            - containerPort: 3200   # HTTP query
            - containerPort: 4317   # OTLP gRPC
            - containerPort: 4318   # OTLP HTTP
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
            - name: storage
              mountPath: /var/tempo
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: tempo-config
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: aakp-tempo
  namespace: aakp-monitoring
spec:
  selector:
    app: aakp-tempo
  ports:
    - name: http
      port: 3200
      targetPort: 3200
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
---
# OpenTelemetry Collector
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: aakp-monitoring
data:
  otel-collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 512
      resource:
        attributes:
          - action: insert
            key: service.namespace
            value: aakp

    exporters:
      otlp:
        endpoint: "http://aakp-tempo.aakp-monitoring.svc.cluster.local:4317"
        tls:
          insecure: true
      prometheus:
        endpoint: "0.0.0.0:8889"
      loki:
        endpoint: "http://aakp-loki.aakp-monitoring.svc.cluster.local:3100/loki/api/v1/push"

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch, resource]
          exporters: [otlp]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
        logs:
          receivers: [otlp]
          processors: [batch, resource]
          exporters: [loki]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aakp-otel-collector
  namespace: aakp-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aakp-otel-collector
  template:
    metadata:
      labels:
        app: aakp-otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.98.0
          args: ["--config=/etc/otel/otel-collector.yaml"]
          ports:
            - containerPort: 4317
            - containerPort: 4318
            - containerPort: 8889  # Prometheus metrics export
          volumeMounts:
            - name: config
              mountPath: /etc/otel
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: aakp-otel-collector
  namespace: aakp-monitoring
spec:
  selector:
    app: aakp-otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: metrics
      port: 8889
      targetPort: 8889
