name: AAKP CI — Lint, Test & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  helm-lint:
    name: Helm Chart Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: "3.14.0"

      - name: Add Helm repos
        run: |
          helm repo add bitnami              https://charts.bitnami.com/bitnami
          helm repo add kong                 https://charts.konghq.com
          helm repo add qdrant               https://qdrant.github.io/qdrant-helm
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana              https://grafana.github.io/helm-charts
          helm repo update

      - name: Lint Fuseki chart
        run: helm lint infra/helm/knowledge-layer/

      - name: Validate values — data layer
        run: |
          helm template aakp-minio bitnami/minio -f infra/helm/data-layer/minio-values.yaml > /dev/null
          helm template aakp-kafka bitnami/kafka -f infra/helm/data-layer/kafka-values.yaml > /dev/null

      - name: Validate values — information layer
        run: |
          helm template aakp-postgresql bitnami/postgresql -f infra/helm/information-layer/postgresql-values.yaml > /dev/null
          helm template aakp-qdrant qdrant/qdrant -f infra/helm/information-layer/qdrant-values.yaml > /dev/null

      - name: Validate values — agent + gateway
        run: |
          helm template aakp-redis bitnami/redis -f infra/helm/agent-layer/redis-values.yaml > /dev/null
          helm template aakp-kong kong/kong -f infra/gateway/kong-values.yaml > /dev/null

  kubectl-validate:
    name: Namespace & RBAC Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate namespace & RBAC YAML syntax
        run: |
          pip install pyyaml
          python -c "
          import yaml, pathlib
          for f in ['infra/namespaces/namespaces.yaml', 'infra/rbac/rbac.yaml']:
            list(yaml.safe_load_all(pathlib.Path(f).read_text()))
            print('OK', f)
          "

  api-tests:
    name: API Pytest (postgres + API)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aakp
          POSTGRES_PASSWORD: aakp-pg-secret
          POSTGRES_DB: aakp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://aakp:aakp-pg-secret@localhost:5432/aakp
      API_BASE: http://localhost:8000/api/v1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r services/api/requirements.txt pytest httpx requests websockets

      - name: Run Alembic migrations
        working-directory: services/api
        run: alembic upgrade head

      - name: Start API server
        working-directory: services/api
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/v1/health && break
            sleep 2
          done

      - name: Seed question bank
        working-directory: services/api
        run: |
          python -c "import asyncio; from app.seeds.question_bank_seed import seed_all; asyncio.run(seed_all('http://localhost:8000'))"

      - name: Pytest (postgres + API only; skip Fuseki/Kong/K8s)
        run: |
          python -m pytest tests/test_02_api.py tests/test_06_sprint8.py tests/test_07_sprint9.py tests/test_08_sprint10.py tests/test_09_sprint11.py -v \
            -k "not knowledge_agents and not shacl and not kg_has_triples and not agent_registry"

  playwright-e2e:
    name: Playwright E2E (frontend)
    runs-on: ubuntu-latest
    needs: api-tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aakp
          POSTGRES_PASSWORD: aakp-pg-secret
          POSTGRES_DB: aakp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://aakp:aakp-pg-secret@localhost:5432/aakp
      API_BASE: http://localhost:8000/api/v1
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install API dependencies
        run: pip install -r services/api/requirements.txt

      - name: Migrate and start API
        working-directory: services/api
        run: |
          alembic upgrade head
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/v1/health && break
            sleep 2
          done

      - name: Seed question bank
        working-directory: services/api
        run: python -c "import asyncio; from app.seeds.question_bank_seed import seed_all; asyncio.run(seed_all('http://localhost:8000'))"

      - name: Install frontend + Playwright
        working-directory: services/frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        working-directory: services/frontend
        run: npm run test:e2e
